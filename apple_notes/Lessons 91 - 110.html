<!DOCTYPE html><html><head><meta charset='utf-8'><style>body{font-family:-apple-system,Helvetica,Arial,sans-serif;max-width:800px;margin:40px auto;padding:20px;font-size:14px;line-height:1.6;color:#333;}h1{font-size:20px;border-bottom:1px solid #ccc;padding-bottom:10px;}</style></head><body><h1>Lessons 91 - 110</h1><div><h1>L</h1><h1>esson</h1><h1>s </h1><h1>91</h1><h1> - 110</h1><h1><br></h1></div>
<div><br></div>
<div><object><table cellspacing="0" cellpadding="0" style="border-collapse: collapse; direction: ltr">
<tbody>
<tr><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div><b>#</b></div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div><b>lesson</b></div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div><b>iteration</b></div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div><b>duration</b></div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div><b>noteworthy text</b></div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div><b>extra messages</b></div>
</td></tr>
<tr><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>91</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>Miracles are seen in light.</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>3 x / frequently / temptation</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>10 mins / 5 – 6 time per hour</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>[…] Remember that miracles and vision necessarily go together.   The miracle is <u>always</u> there.</div>
<div>Light is crucial.</div>
<div>What [I] do not see is there. Faith goes to what [I] want, and [I] instruct [my] mind accordingly.  [My] will remains [my] teacher, and [my] will has all the strength to do what it desires.  [I] can escape the body if [I] choose. </div>
<div>What [I] think [I am] is a belief to be undone.</div>
<div>[I] need a real experience of something else, something more solid and more sure, worthy of [my] faith, and really there.</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>Miracles are seen in light.</div>
<div>The body's eyes do not perceive the light.</div>
<div>But I am not a body.  What am I?</div>
<div><br></div>
<div>Miracles are seen in light.  Let me not close my eyes because of this.</div>
</td></tr>
<tr><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>92</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>Miracles are seen in light, and light and strength are one.</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>2 x / as often as we can</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>20 mins</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>This is no more foolish than to believe the body's eyes can see, the brain can think.<b><span style="font-size: 16px"><br></span></b></div>
<div>It is God's strength in you that is the light in which you see, as it is His Mind with which you think. Strength and light unite in [me] where they meet, [my] Self stands ready to embrace [me] as Its own.<b>[..] Asking truth to show [me] how to find the meeting place of self and Self, where light and strength are one.</b></div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>Introduced to sight and led away from darkness to the light, where only miracles can be perceived.</div>
</td></tr>
<tr><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>93</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>Light and joy and peace abide in me.</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>hourly / response to temptation</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>5 mins on the top of each waking hour</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>Your image of yourself cannot withstand the Will of God. <b><span style="font-size: 16px"><br></span></b></div>
<div>Anything [self] seems to do and think means nothing.  It is unreal and nothing more than that.<b><span style="font-size: 16px"><br></span></b></div>
<div>What power can this self you made possess when it would contradict the Will of God? Salvation requires the acceptance of but one thought – [I am] as God created [me]</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>(I will forever be exactly as God created me)<b><span style="font-size: 16px"><br></span></b></div>
<div>Light and joy and peace abide in me.<b><span style="font-size: 16px"><br></span></b></div>
<div>[My] sinlessness is guaranteed by God. Try to experience the unity of your One Self.  Here [I am]  This is [me].</div>
</td></tr>
<tr><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>94</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>I am as God created me.*<b><span style="font-size: 16px"><br></span></b></div>
<div><b><span style="font-size: 16px"><br></span></b></div>
<div>This is a key idea in ACIM that will be repeated often.  See <b>Open Minded Meditation</b> in Study Guide</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>hourly / frequently / response to temptation</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>5 mins on the top of each waking hour</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>Here is salvation accomplished.</div>
<div>[…] Wait in silent expectancy for the truth.  God Himself has promised that it will be revealed to all who ask for it.</div>
<div>Each exercise [I] do will be a giant stride toward [my] release and a milestone in learning the thought system which this course sets forth.</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>I am [You are] as God created me.</div>
<div>I am [You are] His Son eternally.</div>
</td></tr>
<tr><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>95</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>I am One Self, united with my Creator</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>hourly / frequently / response to temptation</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>5 mins on the top of each waking hour</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>You do not accept [today's idea] and you fail to realize it must be so, only because you believe that you have changed yourself already.<b><span style="font-size: 16px"><br></span></b></div>
<div>Let us therefore be determined, particularly for the next week or so, to be willing to forgive ourselves for our lapses in diligence and our failures to follow the instructions for practicing the day's idea.<b><span style="font-size: 16px"><br></span></b></div>
<div>When you fail to comply with the requirements of this course, you have merely made a mistake.  This calls for correction and nothing else.<b><span style="font-size: 16px"><br></span></b></div>
<div>{These errors] are attempts to keep you unaware you are One Self, united with your Creator, at one with every aspect of creation and limitless in power and peace. <b><span style="font-size: 16px"><br></span></b></div>
<div>This is the truth.  Noting else is true.<b><span style="font-size: 16px"><br></span></b></div>
<div>Try to reach the place in you in which there is no doubt that only this is true. <b><span style="font-size: 16px"><br></span></b></div>
<div>[I am] God's Son, One Self with one Creator and <b>one goal </b>– to bring awareness of this oneness to all minds, that true create may extend the All-ness and the Unity of God.</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>In patience and in hope we try again today.<b><span style="font-size: 16px"><br></span></b></div>
<div><b><span style="font-size: 16px"><br></span></b></div>
<div><u>Hourly </u><b><span style="font-size: 16px"><br></span></b></div>
<div>I am One Self, united with my Creator, At one with every aspect of creation. And limitless in power and peace.<b><span style="font-size: 16px"><br></span></b></div>
<div><u>Frequently:</u><b><span style="font-size: 16px"><br></span></b></div>
<div><b>I am One Self</b>[This is the truth, and nothing else is true]<b><span style="font-size: 16px"><br></span></b></div>
<div><u>To everyone I meet:</u><b><span style="font-size: 16px"><br></span></b></div>
<div>You are One Self with me, United with our Creator in this Self. I honour your because of what I am, And what He is, Who loves us both as one.</div>
</td></tr>
<tr><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>96</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>Salvation comes from my One Self.</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>hourly / frequently / response to temptation</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>5 mins on the top of each waking hour</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>The fact that truth and illusion cannot be reconciled, […] must be accepted if you would be saved.</div>
<div>A mind and body cannot both exist. Make no attempts to reconcile the two, [...] </div>
<div>Spirit makes use of the mind as means to find its Self-expression. And the mind which serves the Spirit is at peace and filled with joy. Its power comes from Spirit, and it is fulfilling happily its function here.</div>
<div>Your Self retains its thoughts, and they remain within your mind an din the Mind of God. Salvation is thought you share with God. Thus is salvation kept among the thoughts your Self hold dear and cherishes for you.</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div><b>Search for Him within your mind. Salvation comes from this One Self through Him Who is the bridge between your mind and [salvation].</b><br></div>
<div><b>Your mind will bless all things.</b><br></div>
<div><br></div>
<div>Salvation comes from my One Self. Its thoughts are mine to use.</div>
</td></tr>
<tr><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>97</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>I am Spirit.</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>hourly / frequently / response to temptation</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>5 mins on the top of each waking hour</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>It simply states the truth.  [The Creator] is with you always, as you are with Him. </div>
<div>[] Help you understand with Him you are the Spirit that abides in Him, and Which calls through His Voice to every living things: offers His sight to everyone who asks; replaces error with the simple truth.</div>
<div>Yet will the steady brilliance of this light remain, and leads you out of darkness, <u>nor will you be able to forget the way again.</u></div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>Spirit am I, a Holy Son of God,</div>
<div>free of all limits, safe and healed and whole,</div>
<div>free to forgive and free to save the world.</div>
</td></tr>
<tr><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>98**</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>I will accept my part in God's plan for salvation.</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>hourly / frequently / response to temptation</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>5 mins on the top of each waking hour</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>Today is a special day of dedication. We dedicate ourselves to truth today and to salvation as God planned it to be.  In gladness we accept it as it is and take the part assigned to us by God.</div>
<div><b>We have a mighty purpose to fulfil and have been given everything ew need with which to reach the goal. </b><br></div>
<div>We do not choose but for ourselves today.</div>
<div>You can exchange a little of your tie for peace of mind and certainty of purpose with the promise of complete success.</div>
<div>He will enable you to understand your special function.</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><br></td></tr>
<tr><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><br></td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>** iambic pentameter, in <u><font color="#E4AF0A">poetry</font></u>, a line of verse composed of ten <u><font color="#E4AF0A">syllables</font></u> arranged in five metrical feet (<u><font color="#E4AF0A">iambs</font></u>), each of which consists of an unstressed <u><font color="#E4AF0A">syllable</font></u> followed by a stressed syllable</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>5 meter (10-syllables)<b><span style="font-size: 16px"><br></span></b></div>
<div><b><span style="font-size: 16px"><br></span></b></div>
<div>da-DAH, da-DAH, da-DAH, da-DAH, da-DAH</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><br></td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>You should be able to detect this 5 meter rhythm after the title and the first sentence:    </div>
<div><br></div>
<div>We take a stand on but one side today. </div>
<div>We side with truth and let illusions go. </div>
<div>We will not vacillate between the two </div>
<div>but take a firm position with the one.</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>The remainder of the entire workbook (with minor exceptions) follow this poetic beat.</div>
</td></tr>
<tr><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>99</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>Salvation is my only function here.</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>hourly / frequently / response to temptation</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>5 mins on the top of each waking hour</div>
</td><td valign="top" style="border-style: solid; border-width: 1.0px 1.0px 1.0px 1.0px; border-color: #ccc; padding: 3.0px 5.0px 3.0px 5.0px; min-width: 70px"><div>Salvation and forgiveness are the same.</div>
<div>What but a Thought of God could be this plan by which the never done is overlooked and sins forgotten which were never real?</div>
<div>The Holy Spirit looks on what [I] see - [...] Yet does He know one thing must still be true – God still is Love.</div>
<div>Now [I] am entrusted with this plan, along with Him. He has one answer to appearances regardless of their form, their size, their depth, or any attribute them seem to have:  [response to temptation]</div>
<div>You who will yet work miracles […]</div>
<div><b>Forgive yourself the thought He wanted this* for you. </b>(*the world of pain)</div>
<div>Open your secrets to His kindly Light, and see how bright this Light still shines in you.</div>
<div><b>It is God's Will that His one Son is [me].</b><br></div>
<div>[I] have a special message for [me] today which has the power to remove all forms of doubt and fear forever from [my] mind.</div>
